name: Cargo lint and test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  # Not needed in CI, should make things a bit faster
  CARGO_INCREMENTAL: 0
  CARGO_TERM_COLOR: always
  # Remove unnecessary WASM build artifacts
  WASM_BUILD_CLEAN_TARGET: 1
  # Stripping symbols and optimizing for binary size
  RUSTFLAGS: -C strip=symbols -C opt-level=s

jobs:
  lint-and-test:
    runs-on: ubuntu-24.04
    timeout-minutes: 50
    steps:
      - name: 🛀🏼 Maximize build space
        uses: AdityaGarg8/remove-unwanted-software@90e01b21170618765a73370fcc3abbd1684a7793 # v5
        with:
          remove-android: 'true'
          remove-dotnet: 'true'
          remove-haskell: 'true'
          remove-codeql: 'true'

      - name: Checkout project
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: ⚙️ Install rust compilation dependencies
        run: |
          sudo apt-get update
          sudo apt-get -y install libudev-dev libclang-dev llvm-dev

      - name: 👨‍🔧 Install Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 20

      - name: 👩‍🔧 Install pnpm
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8
        with:
          version: 10

      - name: 🔎 Read Rust toolchain version
        id: rust-toolchain
        run: |
          channel=$(grep '^channel' rust-toolchain.toml | sed -E 's/.*"(.+)".*/\1/')
          echo "channel=$channel" >> "$GITHUB_OUTPUT"

      - name: 🦿 Install Rust toolchain
        # SHA pins the action code; this action does NOT read rust-toolchain.toml,
        # so the channel is fed in explicitly to keep the toml the single source of truth.
        uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 # v1
        with:
          toolchain: ${{ steps.rust-toolchain.outputs.channel }}
          components: rustfmt, clippy
          targets: wasm32-unknown-unknown

      - name: 🧠 Cache Rust dependencies
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: 🏋️ Install dependencies
        run: pnpm install --frozen-lockfile

      - name: 🏗️ Build TypeScript projects
        run: pnpm -r build

      - name: 🧭 Run lint
        run: |
          pnpm check

      - name: 🧨 Run test
        run: cargo test --release -- --nocapture
