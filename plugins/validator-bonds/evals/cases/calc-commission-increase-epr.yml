question: >
  A validator has expected_non_bid_pmpe = 120, before_sam_commission_increase_pmpe
  = 40, and actual_non_bid_pmpe = 100. Its actual_inflation_commission = 6% and
  actual_mev_commission = 4%. The settlement covers stake = 10,000 SOL.

  Compute: (a) expected_commission_pmpe, (b) expected_epr, (c) actual_epr,
  (d) epr_loss_bps, (e) base_cps, (f) which markup applies and the final
  claim_per_stake, (g) the payout in SOL. Show each formula step.
  Express basis-point values as plain integers (no comma separators).
facts:
  - '0.16'
  - '0.1'
  - '0.06'
  - '3750'
  - 'base_markup_bps'
  - '660 SOL'
wrong_facts:
  - '600 SOL'
  - '1320 SOL'
