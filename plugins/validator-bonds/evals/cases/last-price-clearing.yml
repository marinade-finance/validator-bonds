question: >
  How does the last-price clearing mechanism work in the SAM auction?
  Name the exact ds-sam field identifier for the clearing price and explain
  what it represents (which validator sets it and why all winners pay this price).
facts:
  - 'uniform'
  - 'winningTotalPmpe'
  - 'last validator'
wrong_facts:
  - 'highest bid'
  - 'average bid'
  - 'each validator pays their own bid'
