name: Anchor Test

on: workflow_dispatch

jobs:
  anchor-test:
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    container:
      image: tchambard/solana-test-validator:solana_2.3.7-anchor_0.31.1-light_0.27.0
      options: --user root

    steps:
      - name: ⚓ Info + Setup on Anchor
        run: |
          anchor --version
          mkdir -p "$HOME/.config/solana/"
          cp -r /home/ubuntu/.config/solana/install "$HOME/.config/solana/"
          find "$HOME/.config/"
          ls -la "$HOME/.config/solana/install"

      - name: 🏃‍♂️‍➡️ Checkout project
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: 👩‍🔧 Install pnpm
        uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v5
        with:
          version: 10

      - name: 👨‍🔧 Install Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: 20
          cache: 'pnpm'

      - name: 🌄 Set nightly toolchain
        run: rustup default nightly

      - name: 🎩 List rustup toolchains
        run: rustup toolchain list

      - name: 👓 Check solana config
        run: solana config get

      - name: 🧠 Cache Rust dependencies
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: 🧨 Running tests for project
        run: |
          pnpm install
          pnpm test
