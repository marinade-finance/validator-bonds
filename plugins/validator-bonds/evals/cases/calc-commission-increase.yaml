question: >
  Using the CommissionSamIncrease claim_per_stake logic in
  settlement-distributions/settlement-common/src/protected_events.rs and the
  config in settlement-config.yaml (extra_penalty_threshold_bps = 700 = 7%,
  base_markup_bps = 1000 = 10%, penalty_markup_bps = 10000 = 100%,
  covered_range_bps [0, 10000]):

  A validator raised commission so that expected_epr = 0.10 but actual_epr =
  0.08. Its actual_inflation_commission = 5% and actual_mev_commission = 3%,
  both at or below the 7% extra_penalty_threshold. The settlement covers
  stake = 10,000 SOL.

  Compute: (a) base_cps = expected_epr - actual_epr, (b) which markup applies
  and its fraction, (c) claim_per_stake = base_cps + base_cps * markup,
  (d) the payout in SOL. Show each formula step.
facts:
  - '0.02'
  - 'base_markup_bps'
  - '0.022'
  - '220 SOL'
  - 'CommissionSamIncrease'
wrong_facts:
  - '400 SOL'
  - '200 SOL'
