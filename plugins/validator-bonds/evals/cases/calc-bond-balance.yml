question: >
  A validator has activeStake = 10,000 SOL, relaxedTotalPmpe = 80, bidPmpe = 30.
  The config uses minBondEpochs = 1 and idealBondEpochs = 3.

  Compute: (a) baseBondBalance in SOL, (b) minimum bond balance in SOL,
  (c) ideal bond balance in SOL. Show each formula step.
facts:
  - '800 SOL'
  - '1,400 SOL'
  - '2,000 SOL'
  - 'minBondBalance'
wrong_facts:
  - '1,000 SOL minimum'
  - '1,200 SOL minimum'
