question: >
  A validator has expected_non_bid_pmpe = 120, before_sam_commission_increase_pmpe
  = 40, and actual_non_bid_pmpe = 100. The settlement covers stake = 10,000 SOL.

  Compute: (a) expected_commission_pmpe, (b) expected_epr, (c) actual_epr,
  (d) epr_loss_bps, (e) claim_per_stake, (f) the payout in SOL. Show each formula step.
  Express basis-point values as plain integers (no comma separators).
facts:
  - '0.16'
  - '0.1'
  - '0.06'
  - '3750'
  - '600 SOL'
wrong_facts:
  - '660 SOL'
  - '1320 SOL'
