  Compute: (a) the per-validator total claim for each,
  (b) for BidTooLowPenalty: the distributor cut and the stakers' share,
  (c) for BlacklistPenalty: the distributor cut and the stakers' share,
  (d) state the structural difference. Show each formula step.
facts:
  - '200 SOL'
  - '16 SOL'
  - '184 SOL'
  - 'stakers'
wrong_facts:
