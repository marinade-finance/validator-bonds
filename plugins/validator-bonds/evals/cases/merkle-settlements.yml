question: >
  How do merkle settlements work in the Validator Bonds protocol? Include:
  (a) which off-chain tool builds the merkle tree, (b) which on-chain account
  tracks which claims have been paid, (c) the exact technical mechanism a staker
  uses to prove eligibility and claim (what they submit, what on-chain instruction
  they call).
facts:
  - 'merkle-generator-cli'
  - 'SettlementClaims'
  - 'merkle proof'
  - 'claim'
wrong_facts:
  - 'on-chain generated'
  - 'generated by validators'
