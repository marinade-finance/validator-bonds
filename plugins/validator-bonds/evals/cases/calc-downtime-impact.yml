  expected_credits = 1,000,000. The settlement covers stake = 10,000 SOL.

  Compute: (a) uptime, (b) actual_epr, (c) claim_per_stake, (d) the
  loss-range claim after the clamp, (e) the bond-funded payout in SOL. Show
  each formula step.
facts:
