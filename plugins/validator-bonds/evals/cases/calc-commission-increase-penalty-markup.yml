question: >
  A validator raised commission so that expected_epr = 0.10 and actual_epr =
  0.08. The actual_inflation_commission = 9%. The settlement covers
  stake = 10,000 SOL.

  Compute: (a) base_cps, (b) which markup applies and its fraction, (c)
  claim_per_stake, (d) the payout in SOL. Show each formula step.
facts:
  - '0.02'
  - 'penalty_markup_bps'
  - '0.04'
  - '400 SOL'
  - 'extra_penalty_threshold_bps'
wrong_facts:
  - '200 SOL'
