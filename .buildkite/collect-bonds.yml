agents:
  queue: "snapshots"

env:
  EVENTING_RETRY_MAX_ATTEMPTS_DEFAULT: 4
  EVENTING_RETRY_BASE_DELAY_MS_DEFAULT: 30000
  EVENTING_EMIT_CONCURRENCY_DEFAULT: 20

steps:
  - label: ":hammer_and_wrench: :rust: Build"
    commands:
    - source "$HOME/.cargo/env"
    - cargo build --release --bin bonds-collector --bin validator-bonds-api-cli
    artifact_paths:
      - target/release/bonds-collector
      - target/release/validator-bonds-api-cli

  - input: "What is the Bonds Config type to collect?"
    key: "collect-bonds-input"
    fields:
      - select: "Claim type"
        key: "claim_type"
        options:
          - label: "Bidding Bonds Config"
            value: "bid"
          - label: "Institutional Bonds Config"
            value: "institutional"
    if: "build.env('CLAIM_TYPE') == null"
    blocked_state: running

  - wait: ~

  - label: ":black_nib: Env variables setup"
    key: "setup-env"
    depends_on: "collect-bonds-input"
    allow_dependency_failure: true
    commands:
    - |
      claim_type=${CLAIM_TYPE:-$(buildkite-agent meta-data get claim_type)}
      buildkite-agent meta-data set --redacted-vars='' claim_type "$$claim_type"
      echo "Claim type: '$$claim_type'"
    - |
      claim_type=$(buildkite-agent meta-data get claim_type)
      if [ "$$claim_type" = "bid" ]; then bond_type="bidding"; else bond_type="institutional"; fi
      buildkite-agent meta-data set --redacted-vars='' bond_type "$$bond_type"
      echo "Bond type: '$$bond_type'"
    - |
      retry_max_attempts=${EVENTING_RETRY_MAX_ATTEMPTS:-$EVENTING_RETRY_MAX_ATTEMPTS_DEFAULT}
      buildkite-agent meta-data set --redacted-vars='' retry_max_attempts "$$retry_max_attempts"
      echo "Retry max attempts: '$$retry_max_attempts'"
    - |
      retry_base_delay_ms=${EVENTING_RETRY_BASE_DELAY_MS:-$EVENTING_RETRY_BASE_DELAY_MS_DEFAULT}
      buildkite-agent meta-data set --redacted-vars='' retry_base_delay_ms "$$retry_base_delay_ms"
      echo "Retry base delay ms: '$$retry_base_delay_ms'"
    - |
      emit_concurrency=${EVENTING_EMIT_CONCURRENCY:-$EVENTING_EMIT_CONCURRENCY_DEFAULT}
      buildkite-agent meta-data set --redacted-vars='' emit_concurrency "$$emit_concurrency"
      echo "Emit concurrency: '$$emit_concurrency'"

  - label: ":memo: Annotate retry parameters"
    depends_on: "setup-env"
    allow_dependency_failure: true
    commands:
      - claim_type=$(buildkite-agent meta-data get claim_type)
      - retry_max_attempts=$(buildkite-agent meta-data get retry_max_attempts)
      - retry_base_delay_ms=$(buildkite-agent meta-data get retry_base_delay_ms)
      - emit_concurrency=$(buildkite-agent meta-data get emit_concurrency)
      - |
        cat <<- EOF | buildkite-agent annotate --priority 6 --style info --context "general-info"
        ### Retry environment variables
        If you need to retry the build, use the following parameters:

        \`\`\`
        CLAIM_TYPE=$$claim_type
        EVENTING_RETRY_MAX_ATTEMPTS=$$retry_max_attempts
        EVENTING_RETRY_BASE_DELAY_MS=$$retry_base_delay_ms
        EVENTING_EMIT_CONCURRENCY=$$emit_concurrency
        \`\`\`
        EOF

  - wait: ~

  - label: ":closed_lock_with_key: Concurrency gate lock"
    command: echo "--> Start of concurrency gate"
    concurrency_group: 'validator-bonds/collect-bonds-${CLAIM_TYPE}'
    concurrency: 1

  - wait: ~

  - label: ":microscope: Collect Bonds"
    key: "collect-bonds"
    commands:
    - bond_type=$(buildkite-agent meta-data get bond_type)
    - buildkite-agent artifact download --include-retried-jobs target/release/bonds-collector .
    - chmod +x target/release/bonds-collector
    - |
      ./target/release/bonds-collector collect-bonds \
        --bond-type $$bond_type > bonds.yaml
    artifact_paths:
      - bonds.yaml

  - wait: ~

  - label: ":microscope: Store Bonds"
    commands:
    - buildkite-agent artifact download --include-retried-jobs target/release/validator-bonds-api-cli .
    - buildkite-agent artifact download --include-retried-jobs bonds.yaml .
    - chmod +x target/release/validator-bonds-api-cli
    - curl https://truststore.pki.rds.amazonaws.com/eu-west-1/eu-west-1-bundle.pem -o ./eu-west-1-bundle.pem
    - |
      ./target/release/validator-bonds-api-cli \
        store-bonds --postgres-url "$$POSTGRES_URL" --postgres-ssl-root-cert ./eu-west-1-bundle.pem --input-file bonds.yaml

  - wait: ~

  - label: ":bell: Emit Bond Events"
    key: "emit-bond-events"
    commands:
    - bond_type=$(buildkite-agent meta-data get bond_type)
    - retry_max_attempts=$(buildkite-agent meta-data get retry_max_attempts)
    - retry_base_delay_ms=$(buildkite-agent meta-data get retry_base_delay_ms)
    - emit_concurrency=$(buildkite-agent meta-data get emit_concurrency)
    - echo "--- Note: bond eventing is intentionally implemented only for bidding bonds"
    - echo "--- Emitting bond events for $$bond_type"
    - curl https://truststore.pki.rds.amazonaws.com/eu-west-1/eu-west-1-bundle.pem -o ./eu-west-1-bundle.pem
    - pnpm install
    - pnpm -r build
    - |
      pnpm ts-node packages/bonds-eventing/src/index.ts \
        bidding \
        --retry-max-attempts "$$retry_max_attempts" \
        --retry-base-delay-ms "$$retry_base_delay_ms" \
        --emit-concurrency "$$emit_concurrency" \
        --postgres-ssl-root-cert ./eu-west-1-bundle.pem
    soft_fail:
      - exit_status: "*"

  - wait: ~

  - label: ":unlock: Concurrency gate unlock"
    command: echo "End of concurrency gate <--"
    concurrency_group: 'validator-bonds/collect-bonds-${CLAIM_TYPE}'
    concurrency: 1
