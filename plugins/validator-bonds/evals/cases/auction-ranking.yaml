question: >
  Explain how the SAM auction ranks and selects validators to receive Marinade
  stake. Specifically: what metric is used to rank validators, what determines
  the clearing price (winningTotalPmpe), and what happens to validators whose
  bid is above vs below the clearing price?
facts:
  - 'totalPmpe'
  - 'winningTotalPmpe'
  - 'clearing price'
  - 'samEligible'
  - 'marinadeSamTargetSol'
wrong_facts:
  - 'validators pay their own bid'
  - 'ranked by commission'
  - 'random selection'
