question: >
  A validator earned actual_credits = 750,000 against expected_credits =
  1,000,000. Its actual_non_bid_pmpe = 100. The settlement covers stake = 8,000
  SOL.

  Compute: (a) uptime, (b) expected_epr, (c) actual_epr, (d) epr_loss_bps,
  (e) the raw claim_per_stake, (f) whether the clamp binds, (g) the
  bond-funded payout in SOL. Show each formula step.
facts:
  - '0.75'
  - '0.1'
  - '0.075'
  - '2500'
  - '200 SOL'
wrong_facts:
  - '400 SOL'
  - 'clamp binds'
  - '7500'
