question: >
  How is an InstitutionalPayout amount determined for a Select validator?
  Using the InstitutionalPayout structs in
  settlement-distributions/institutional-distribution/src/institutional_payouts.rs,
  explain: (a) what the APY floor is (is it a fixed rate?), (b) which field
  carries the per-validator APY shortfall, (c) which fields the staker and
  distributor payout lamport amounts are read from, and (d) whether
  institutional-distribution-cli computes the per-staker SOL itself or reads
  pre-computed amounts. Name the exact identifiers.
facts:
  - 'InstitutionalPayout'
  - 'psr_percentile_apy'
  - 'apy_percentile_diff'
  - 'payout_stakers'
  - 'payout_distributors'
wrong_facts:
  - '50bps'
  - '0.5% fixed'
  - 'fixed APY floor'
  - 'BlacklistPenalty'
  - 'BidTooLowPenalty'
