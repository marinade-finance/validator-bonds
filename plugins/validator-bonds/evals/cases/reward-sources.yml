question: >
  What are the sources of rewards that make up a Bidding settlement payout?
  For each component: name it, state its origin, and name the exact field in the
  code struct that tracks it. Include every field in the struct (including the
  staker's proportional share field). Name the struct itself.
facts:
  - 'inflation_commission_claim'
  - 'mev_commission_claim'
  - 'block_commission_claim'
  - 'static_bid_claim'
  - 'ResultSettlementClaims'
  - 'marinade_stake_share'
wrong_facts:
  - 'only inflation rewards'
  - 'fixed amount per epoch'
  - 'no MEV component'
