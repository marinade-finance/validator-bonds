question: >
  Using the DowntimeRevenueImpact logic in
  settlement-distributions/settlement-common/src/protected_events.rs and the
  ValidatorBond-funded config in settlement-config.yaml (covered_range_bps
  [0, 5000]):

  A validator's actual_non_bid_pmpe = 80, so expected_epr = 80/1000 = 0.08
  (lamports paid per 1 staked lamport). It earned actual_credits = 950,000
  against expected_credits = 1,000,000. The settlement covers stake = 10,000 SOL.

  Compute: (a) uptime, (b) actual_epr, (c) claim_per_stake = expected_epr -
  actual_epr, (d) the loss-range claim after the [0, 50%] clamp, (e) the
  bond-funded payout in SOL. Show each formula step.
facts:
  - '0.95'
  - '0.076'
  - '0.004'
  - '40 SOL'
  - 'DowntimeRevenueImpact'
wrong_facts:
  - '400 SOL'
  - 'CommissionSamIncrease'
  - 'BidTooLowPenalty'
