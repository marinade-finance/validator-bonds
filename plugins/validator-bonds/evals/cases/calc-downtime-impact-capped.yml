question: >
  A validator with expected_epr = 0.08 suffered a severe outage: actual_credits
  = 400,000 against expected_credits = 1,000,000. The settlement covers stake =
  10,000 SOL.

  Compute: (a) the raw claim_per_stake, (b) the max_claim_per_stake,
  (c) the clamped claim_per_stake, (d) the bond-funded payout in SOL. Show each
  formula step.
facts:
  - '0.048'
  - '0.04'
  - '400 SOL'
  - 'covered_range_bps'
  - 'Marinade'
wrong_facts:
  - 'bond covers all'
  - 'validator covers 100%'
