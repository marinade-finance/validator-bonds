name: Anchor Test

on: workflow_dispatch

jobs:
  anchor-test:
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    container:
      image: tchambard/solana-test-validator:solana_2.3.7-anchor_0.31.1-light_0.27.0
      options: --user root

    steps:
      - name: ⚓ Info + Setup on Anchor
        run: |
          anchor --version
          mkdir -p "$HOME/.config/solana/"
          cp -r /home/ubuntu/.config/solana/install "$HOME/.config/solana/"
          find "$HOME/.config/"
          ls -la "$HOME/.config/solana/install"

      - name: 🏃‍♂️‍➡️ Checkout project
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: 👩‍🔧 Install pnpm
        uses: pnpm/action-setup@26f6d4f2c533a43e6b5da0b4a5dd983f98f7b49a # v6.0.4
        with:
          version: 10

      - name: 👨‍🔧 Install Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 20
          cache: 'pnpm'

      - name: 🌄 Set nightly toolchain
        run: rustup default nightly

      - name: 🎩 List rustup toolchains
        run: rustup toolchain list

      - name: 👓 Check solana config
        run: solana config get

      - name: 🧠 Cache Rust dependencies
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: 🧨 Running tests for project
        run: |
          pnpm install
          pnpm test
